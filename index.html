<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Keys</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            background: #010816;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* CARD PRINCIPAL */
        .box {
            width: 420px;
            padding: 40px 20px;
            border-radius: 20px;
            background: rgba(4, 12, 28, 0.7);
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .box h2 {
            font-size: 18px;
            letter-spacing: 3px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* AVATAR COM GLOW */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            margin: 0 auto 25px;
            background: url('https://i.pinimg.com/736x/2b/df/03/2bdf03154db67437eb86fb86bd90db14.jpg') center/cover no-repeat;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }

        /* BOTÃO GERAR */
        .btn-main {
            background: linear-gradient(90deg, #1e40af, #2563eb);
            border: none;
            padding: 14px;
            width: 85%;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 auto 25px;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-main:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        /* CAMPO DA KEY GERADA */
        .label-small {
            font-size: 10px;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .key-display {
            width: 85%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #1e40af;
            padding: 12px;
            border-radius: 8px;
            margin: 0 auto 15px;
            color: #3b82f6;
            font-size: 18px;
            font-weight: bold;
            min-height: 22px;
        }

        /* BOTÃO COPIAR */
        .btn-copy {
            background: transparent;
            border: 1px solid #1e40af;
            color: #3b82f6;
            padding: 8px 20px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin: 0 auto;
        }

        .btn-copy:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        /* SEÇÃO CANAL */
        .divider {
            margin: 30px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .channel-label {
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #ccc;
        }

        .btn-channel {
            background: #064e3b;
            border: 1px solid #10b981;
            padding: 12px;
            width: 70%;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
        }

        .btn-channel:hover {
            background: #065f46;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <div class="box">
        <h2>GERAR SUA KEY</h2>
        
        <div class="avatar"></div>

        <button class="btn-main" onclick="gerarKey()">
            ⚡ GERAR SUA KEY
        </button>

        <div class="label-small">SUA KEY GERADA</div>
        <div class="key-display" id="keyOutput">---</div>

        <button class="btn-copy" onclick="copiarKey()">
            📋 COPIAR
        </button>

        <div class="divider"></div>

        <div class="channel-label">CANAL OFICIAL PARA SEGUIR</div>
        <button class="btn-channel">
            📞 Siga "CRACKED MODS"
        </button>
    </div>

    <script>
        // Função para gerar a Key
        function gerarKey() {
            const num = Math.floor(1000 + Math.random() * 9000);
            const novaKey = "Key" + num;
            document.getElementById("keyOutput").innerText = novaKey;
        }

        // Função para copiar
        function copiarKey() {
            const keyText = document.getElementById("keyOutput").innerText;
            if(keyText === "---") return;
            
            navigator.clipboard.writeText(keyText);
            const btn = document.querySelector(".btn-copy");
            btn.innerText = "✔ COPIADO";
            setTimeout(() => btn.innerText = "📋 COPIAR", 2000);
        }

        // Fundo Animado (Partículas)
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        for (let i = 0; i < 80; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(59, 130, 246, 0.5)";
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
