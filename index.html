<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Keys Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #010816;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        h1 {
            margin-top: 40px;
            font-size: 55px; /* Aumentado */
            letter-spacing: 10px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        h1 span { color: #3b82f6; }

        /* CARD MAIOR */
        .box {
            width: 550px; /* Aumentado de 420 para 550 */
            padding: 50px;
            border-radius: 25px;
            background: rgba(4, 12, 28, 0.75);
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 60px rgba(0, 0, 0, 1);
            text-align: center;
            backdrop-filter: blur(15px);
            margin-top: 20px;
        }

        .box h2 {
            font-size: 22px;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        /* AVATAR */
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #3b82f6;
            margin: 0 auto 35px;
            background: url('https://i.pinimg.com/736x/2b/df/03/2bdf03154db67437eb86fb86bd90db14.jpg') center/cover no-repeat;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
        }

        /* BOTÕES */
        .btn-main {
            background: linear-gradient(90deg, #1e40af, #2563eb);
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .btn-main:hover { filter: brightness(1.3); transform: scale(1.02); }

        .key-display {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #1e40af;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0 20px;
            color: #3b82f6;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .btn-copy {
            background: transparent;
            border: 1px solid #1e40af;
            color: #3b82f6;
            padding: 10px 30px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-copy:hover { background: rgba(59, 130, 246, 0.1); }

        .btn-channel {
            margin-top: 20px;
            background: #064e3b;
            border: 1px solid #10b981;
            padding: 15px;
            width: 80%;
            border-radius: 10px;
            color: #10b981;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
        }

        /* RODAPÉ */
        .footer { position: fixed; bottom: 30px; font-size: 12px; color: #444; }
        .footer span { color: #3b82f6; }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <h1>GERADOR DE <span>KEYS</span></h1>

    <div class="box">
        <h2>GERAR SUA KEY</h2>
        <div class="avatar"></div>

        <button class="btn-main" onclick="gerarKey()">⚡ GERAR SUA KEY</button>

        <p style="font-size: 10px; color: #777;">SUA KEY GERADA</p>
        <div class="key-display" id="keyOutput">********</div>
        <button class="btn-copy" onclick="copiarKey()">📋 COPIAR</button>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.05);">

        <p style="font-size: 12px; color: #ccc; margin-bottom: 15px;">CANAL OFICIAL PARA SEGUIR</p>
        <button class="btn-channel">📞 Siga "CRACKED MODS"</button>
    </div>

    <div class="footer">Feito Por <span>Riquelme</span></div>

    <script>
        function gerarKey() {
            const random = Math.floor(10000 + Math.random() * 90000);
            document.getElementById("keyOutput").innerText = "Key" + random;
        }

        function copiarKey() {
            const text = document.getElementById("keyOutput").innerText;
            if(text.includes("*")) return;
            navigator.clipboard.writeText(text);
            alert("Copiado!");
        }

        /* EFEITO CONSTELAÇÃO (SNOW COM LINHAS) */
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const maxDistance = 150; // Distância para criar as linhas

        for (let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.6,
                vy: (Math.random() - 0.5) * 0.6
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.fillStyle = "#3b82f6";
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();

                // Lógica das Linhas
                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dx = p.x - p2.x;
                    let dy = p.y - p2.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < maxDistance) {
                        ctx.strokeStyle = `rgba(59, 130, 246, ${1 - dist/maxDistance})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
