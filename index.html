<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador VTX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #010816;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        h1 {
            margin-top: 40px;
            font-size: 50px;
            letter-spacing: 10px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            text-align: center;
        }

        h1 span { color: #3b82f6; }

        .box {
            width: 550px;
            padding: 50px;
            border-radius: 25px;
            background: rgba(4, 12, 28, 0.85);
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 60px rgba(0, 0, 0, 1);
            text-align: center;
            backdrop-filter: blur(15px);
            margin-top: 20px;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #3b82f6;
            margin: 0 auto 30px;
            background: url('https://i.pinimg.com/736x/2b/df/03/2bdf03154db67437eb86fb86bd90db14.jpg') center/cover no-repeat;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
        }

        .btn-main {
            background: linear-gradient(90deg, #1e40af, #2563eb);
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-main:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* AREA DA KEY ESCONDIDA */
        #resultArea {
            display: none;
            margin-top: 30px;
        }

        .key-display {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #1e40af;
            padding: 20px;
            border-radius: 12px;
            color: #3b82f6;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        .btn-copy {
            background: transparent;
            border: 1px solid #1e40af;
            color: #3b82f6;
            padding: 10px 40px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-copy:hover { background: rgba(59, 130, 246, 0.1); }

        /* SEÇÃO DE LINKS */
        .links-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn-social {
            background: #064e3b;
            border: 1px solid #10b981;
            padding: 14px;
            width: 85%;
            border-radius: 10px;
            color: #10b981;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .btn-social:hover {
            background: #065f46;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        .footer { position: fixed; bottom: 20px; font-size: 11px; color: #444; }
        .footer span { color: #3b82f6; }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <h1>GERADOR DE <span>KEYS</span></h1>

    <div class="box">
        <p style="font-size: 12px; letter-spacing: 2px; margin-bottom: 20px;">GERAR SUA KEY</p>
        <div class="avatar"></div>

        <button class="btn-main" onclick="gerarKey()">⚡ GERAR SUA KEY</button>

        <div id="resultArea">
            <p style="font-size: 10px; color: #777; margin-bottom: 10px;">SUA KEY GERADA</p>
            <div class="key-display" id="keyOutput">Vortex8k</div>
            <button class="btn-copy" id="btnCopy" onclick="copiarKey()">📋 COPIAR</button>
        </div>

        <div class="links-container">
            <p style="font-size: 12px; color: #ccc; margin-bottom: 5px;">CANAL OFICIAL PARA SEGUIR</p>
            
            <a href="https://whatsapp.com/channel/0029VbC7FWcJENxsIOsndS15" target="_blank" class="btn-social">
                📢 Siga o Canal WhatsApp
            </a>

            <a href="https://chat.whatsapp.com/Kh7J0MC8mMFKv0sNcZriJT" target="_blank" class="btn-social">
                🚀 Entrar no Grupo
            </a>
        </div>
    </div>

    <div class="footer">Feito Por <span>Vortex</span></div>

    <script>
        function gerarKey() {
            // Mostra a área da key
            document.getElementById("resultArea").style.display = "block";
            // Opcional: Efeito de scroll suave para o novo conteúdo
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function copiarKey() {
            const text = document.getElementById("keyOutput").innerText;
            navigator.clipboard.writeText(text);
            
            const btn = document.getElementById("btnCopy");
            btn.innerText = "✔ COPIADO!";
            btn.style.borderColor = "#10b981";
            btn.style.color = "#10b981";

            setTimeout(() => { 
                btn.innerText = "📋 COPIAR";
                btn.style.borderColor = "#1e40af";
                btn.style.color = "#3b82f6";
            }, 2000);
        }

        /* EFEITO SNOW/CONSTELAÇÃO */
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.fillStyle = "rgba(59, 130, 246, 0.6)";
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 150) {
                        ctx.strokeStyle = `rgba(59, 130, 246, ${1 - dist/150 - 0.3})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
